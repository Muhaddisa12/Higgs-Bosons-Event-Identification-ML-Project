# XGBoost Model Configuration

model:
  name: "xgboost"
  n_estimators: 100
  learning_rate: 0.1
  max_depth: 6
  min_child_weight: 1
  subsample: 0.8
  colsample_bytree: 0.8
  gamma: 0
  reg_alpha: 0
  reg_lambda: 1
  scale_pos_weight: 1
  tree_method: "hist"
  n_jobs: -1
  random_state: 42
  verbose: 0

training:
  use_validation: true
  early_stopping: true
  early_stopping_rounds: 10

evaluation:
  threshold: 0.5
  calculate_roc: true
  calculate_pr_curve: true
  threshold_range: [0.3, 0.4, 0.5, 0.6, 0.7, 0.8, 0.9]

output:
  model_path: "models/xgboost_best.pkl"
  metadata_path: "models/model_metadata.json"
  figures_dir: "outputs/figures"
