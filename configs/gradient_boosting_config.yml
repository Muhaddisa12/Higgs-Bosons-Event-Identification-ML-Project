# Gradient Boosting Model Configuration

model:
  name: "gradient_boosting"
  n_estimators: 100
  learning_rate: 0.1
  max_depth: 3
  min_samples_split: 2
  min_samples_leaf: 1
  subsample: 1.0
  max_features: null
  validation_fraction: 0.2
  n_iter_no_change: 10
  random_state: 42
  verbose: 0

training:
  use_validation: true
  early_stopping: true

evaluation:
  threshold: 0.5
  calculate_roc: true
  calculate_pr_curve: true
  threshold_range: [0.3, 0.4, 0.5, 0.6, 0.7, 0.8, 0.9]

output:
  model_path: "models/gradient_boosting_best.pkl"
  metadata_path: "models/model_metadata.json"
  figures_dir: "outputs/figures"
