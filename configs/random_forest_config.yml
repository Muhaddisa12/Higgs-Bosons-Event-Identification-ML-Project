# Random Forest Model Configuration

model:
  name: "random_forest"
  n_estimators: 100
  max_depth: 20
  min_samples_split: 2
  min_samples_leaf: 1
  max_features: "sqrt"
  bootstrap: true
  class_weight: "balanced"
  n_jobs: -1
  random_state: 42
  verbose: 0

training:
  use_validation: true
  early_stopping: false

evaluation:
  threshold: 0.5
  calculate_roc: true
  calculate_pr_curve: true
  threshold_range: [0.3, 0.4, 0.5, 0.6, 0.7, 0.8, 0.9]

output:
  model_path: "models/random_forest_best.pkl"
  metadata_path: "models/model_metadata.json"
  figures_dir: "outputs/figures"
